##### General usability #####

# Increase scrollback
set -g history-limit 100000

# Start windows/panes at 1 (more natural)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows
set -g renumber-windows on

# Faster escape sequences (fixes lag in Neovim)
set -sg escape-time 0

# Enable focus events (important for Neovim)
set -g focus-events on

# Don’t rename windows automatically
set -g allow-rename off

# Visual bell instead of audible
set -g visual-bell on
set -g bell-action none

##### Key bindings #####

# Use Ctrl-a as leader keys instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# Split windows (keep current directory)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Mouse #####

# Enable mouse (scroll, resize, select panes)
set -g mouse on


##### Copy mode (vim-style) #####

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


##### Terminal & colors #####

# Use modern terminfo (better than screen-256color)
set -g default-terminal "tmux-256color"

# Enable true color
set -ga terminal-overrides ",*:Tc"


##### Rosé Pine theme #####

# Status bar background/foreground
set -g status-style "bg=#26233a,fg=#e0def4"

# Left side (session name)
set -g status-left "#[bg=#c4a7e7,fg=#191725,bold] #S #[bg=#26233a] "

# Right side (user + host + time)
set -g status-right "#[fg=#908caa]#(whoami)@#H #[fg=#6e6a86]| #[fg=#9ccfd8]%Y-%m-%d %H:%M "

# Window tabs
setw -g window-status-style "fg=#908caa,bg=#26233a"
setw -g window-status-current-style "fg=#c4a7e7,bg=#26233a,bold"

# Pane borders
set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"

# Message (e.g. prefix feedback)
set -g message-style "bg=#f6c177,fg=#191725"
set -g prompt-cursor-colour "#191725"

## Mode (copy mode, etc.)
set -g mode-style "bg=#26233a,fg=#31748f"
